```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Me</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#06b6d4);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.contact-container{
    width:100%;
    max-width:1100px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
}

.contact-info,
.contact-form{
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:40px;
    color:white;
    box-shadow:0 8px 30px rgba(0,0,0,.3);
}

.contact-info h2,
.contact-form h2{
    margin-bottom:20px;
    font-size:2rem;
}

.contact-info p{
    color:#e5e7eb;
    line-height:1.8;
    margin-bottom:30px;
}

.info-box{
    display:flex;
    align-items:center;
    gap:15px;
    margin-bottom:20px;
}

.info-box i{
    width:50px;
    height:50px;
    background:#38bdf8;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:50%;
    font-size:1.2rem;
}

.social-links{
    margin-top:25px;
}

.social-links a{
    display:inline-flex;
    justify-content:center;
    align-items:center;
    width:45px;
    height:45px;
    background:#38bdf8;
    color:white;
    border-radius:50%;
    margin-right:10px;
    text-decoration:none;
    transition:.3s;
}

.social-links a:hover{
    transform:translateY(-5px);
    background:white;
    color:#0f172a;
}

.input-box{
    margin-bottom:18px;
}

.input-box input,
.input-box textarea{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:12px;
    background:rgba(255,255,255,.15);
    color:white;
}

.input-box input::placeholder,
.input-box textarea::placeholder{
    color:#ddd;
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#38bdf8;
    color:white;
    font-size:1rem;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    background:#0ea5e9;
    transform:translateY(-3px);
}

@media(max-width:768px){

.contact-container{
    grid-template-columns:1fr;
}

.contact-info,
.contact-form{
    padding:25px;
}

}
</style>
</head>

<body>

<div class="contact-container">

    <!-- Left Side -->
    <div class="contact-info">

        <h2>Get In Touch</h2>

        <p>
            Have a project in mind or want to collaborate?
            Feel free to reach out. I'm always open to
            discussing new opportunities and ideas.
        </p>

        <div class="info-box">
            <i class="fas fa-user"></i>
            <div>
                <h4>Sayed Rukshaan</h4>
                <small>Web Developer</small>
            </div>
        </div>

        <div class="info-box">
            <i class="fas fa-envelope"></i>
            <div>
                <h4>rukshaansayed0@gmail.com</h4>
            </div>
        </div>

        <div class="info-box">
            <i class="fas fa-phone"></i>
            <div>
                <h4>+91 9632497890</h4>
            </div>
        </div>

        <div class="info-box">
            <i class="fas fa-location-dot"></i>
            <div>
                <h4>India</h4>
            </div>
        </div>

        <div class="social-links">
            <a href="https://github.com/sayed123-ai"><i class="fab fa-github"></i></a>
            <a href="#"><i class="fab fa-linkedin-in"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-x-twitter"></i></a>
        </div>

    </div>

    <!-- Right Side -->
    <div class="contact-form">

        <h2>Send Message</h2>

        <form onsubmit="sendMessage(event)">

            <div class="input-box">
                <input type="text"
                placeholder="Your Name" required>
            </div>

            <div class="input-box">
                <input type="email"
                placeholder="Your Email" required>
            </div>

            <div class="input-box">
                <input type="text"
                placeholder="Subject" required>
            </div>

            <div class="input-box">
                <textarea rows="6"
                placeholder="Your Message"
                required></textarea>
            </div>

            <button type="submit" class="btn">
                Send Message
            </button>

        </form>

    </div>

</div>

<script>
function sendMessage(e){
    e.preventDefault();
    alert("✅ Message Sent Successfully!");
}
</script>

</body>
</html>
```
